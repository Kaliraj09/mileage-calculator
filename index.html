<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mileage Calculator By Kali</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-card">
        <h1 class="main-heading">Mileage Calculator By Kali</h1>
        
        <div class="form-container">
            <div class="input-group">
                <label>Km Travelled</label>
                <input type="number" id="distance" placeholder="e.g. 500">
            </div>

            <div class="input-group">
                <label>Type of Fuel</label>
                <select id="fuelType">
                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                </select>
            </div>

            <div class="input-group">
                <label>Fuel Filled (Litres)</label>
                <input type="number" id="fuelQuantity" placeholder="e.g. 20">
            </div>

            <div class="input-group">
                <label>Total Amount Spent</label>
                <input type="number" id="totalAmount" placeholder="e.g. 2000">
            </div>

            <button onclick="calculateKali()">Calculate Results</button>
        </div>

        <div id="results" class="results-area hidden">
            <div class="res-item"><strong>Fuel Cost per kilometer:</strong> <span id="costPerKm">0</span></div>
            <div class="res-item"><strong>Mileage per Litre:</strong> <span id="mileage">0</span></div>
            <div class="res-item"><strong>Fuel:</strong> <span id="dispFuel">Petrol</span></div>
            <div class="res-item"><strong>Distance:</strong> <span id="dispDist">0</span> km</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
